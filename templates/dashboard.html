<!DOCTYPE html>
<html>
<head>
<title>Flights</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Available Flights ✈️</h2>

    <div class="row">
        {% for flight in flights %}
        <div class="col-md-4">
            <div class="card p-3 mb-3 shadow">
                <h5>{{ flight[1] }} → {{ flight[2] }}</h5>
                <p>Price: ₹{{ flight[3] }}</p>
                <a href="/book/{{ flight[0] }}" class="btn btn-primary">Book Now</a>
            </div>
        </div>
        {% endfor %}
    </div>

    <a href="/admin" class="btn btn-dark mt-3">Admin Panel</a>
</div>

</body>
</html>
