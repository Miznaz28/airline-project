<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 col-md-5">
    <h2 class="mb-4 text-center">Add Flight ✈️</h2>

    <form method="post" class="card p-4 shadow">
        <input name="source" class="form-control mb-3" placeholder="Source">
        <input name="destination" class="form-control mb-3" placeholder="Destination">
        <input name="price" class="form-control mb-3" placeholder="Price">
        <button class="btn btn-success w-100">Add Flight</button>
    </form>
</div>

</body>
</html>
